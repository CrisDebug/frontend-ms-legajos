<!-- 📌 SOLO SI HAY CASILLERO -->
<div *ngIf="(casilleroId$ | async) as casilleroId; else noContext">

  <!-- 🔎 BUSCADOR (solo con contexto) -->
  <app-legajos-search
    [casilleroId]="casilleroId"
    [resetTrigger]="casilleroId"
    (onSearch)="buscar($event)">
  </app-legajos-search>

  <!-- ✅ MENSAJE DE FEEDBACK -->
  <div
    *ngIf="mensaje"
    class="mt-3 mb-3 p-3 rounded-lg border text-sm"
    [ngClass]="mensaje.includes('Error')
      ? 'bg-red-100 text-red-700 border-red-300'
      : 'bg-green-100 text-green-700 border-green-300'">

    {{ mensaje }}

  </div>

  <!-- 📦 RESULTADO (STATE MACHINE) -->
  <app-legajo-state
    [state]="state"
    (create)="startCreate($event)"
    (save)="saveLegajo($event)"
    (cancel)="cancelCreate()">
  </app-legajo-state>

</div>

<!-- ❌ SIN CASILLERO -->
<ng-template #noContext>
  <p class="text-slate-500">
    Selecciona un casillero para comenzar
  </p>
</ng-template>
