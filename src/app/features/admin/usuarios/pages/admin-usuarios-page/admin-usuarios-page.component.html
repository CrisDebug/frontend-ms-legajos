<div class="min-h-screen bg-gray-100 p-4">

  <!-- HEADER -->
  <div class="max-w-5xl mx-auto mb-6">
    <h1 class="text-2xl font-bold text-gray-800">
      Gestión de Usuarios
    </h1>
    <p class="text-sm text-gray-500">
      Administración de usuarios del sistema
    </p>
  </div>

  <!-- LOADING -->
  <div *ngIf="loading" class="text-center text-gray-500">
    Cargando usuarios...
  </div>

  <!-- TABLE CARD -->
  <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-sm overflow-hidden">

    <div class="overflow-x-auto">

      <table class="w-full text-sm">

        <!-- HEADER TABLE -->
        <thead class="bg-gray-50 border-b">
          <tr class="text-left text-gray-600">
            <th class="p-3">ID</th>
            <th class="p-3">Nombre</th>
            <th class="p-3">Email</th>
            <th class="p-3">Rol</th>
          </tr>
        </thead>

        <!-- BODY -->
        <tbody>

          <tr
            *ngFor="let u of usuarios"
            class="border-b hover:bg-gray-50 transition"
          >

            <td class="p-3 text-gray-700">
              {{ u.idUsuario }}
            </td>

            <td class="p-3 font-medium text-gray-800">
              {{ u.nombreUsuario }}
            </td>

            <td class="p-3 text-gray-600">
              {{ u.email }}
            </td>

            <td class="p-3">
              <span
                class="px-2 py-1 rounded-full text-xs font-semibold"
                [ngClass]="{
                  'bg-green-100 text-green-700': u.rol === 'ADMIN',
                  'bg-blue-100 text-blue-700': u.rol === 'USER'
                }"
              >
                {{ u.rol }}
              </span>
            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </div>

</div>
