<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

  <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg p-6">

    <h1 class="text-2xl font-bold text-center mb-6">
      Registro
    </h1>

    <form [formGroup]="form" (ngSubmit)="register()" class="space-y-4">

      <!-- NOMBRE -->
      <div>
        <input
          type="text"
          formControlName="nombreUsuario"
          placeholder="Nombre"
          class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          [class.border-red-500]="form.get('nombreUsuario')?.invalid && form.get('nombreUsuario')?.touched"
        />

        <small class="text-red-500 text-xs"
          *ngIf="form.get('nombreUsuario')?.invalid && form.get('nombreUsuario')?.touched">
          El nombre es obligatorio
        </small>
      </div>

      <!-- EMAIL -->
      <div>
        <input
          type="email"
          formControlName="email"
          placeholder="Correo electrónico"
          class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          [class.border-red-500]="form.get('email')?.invalid && form.get('email')?.touched"
        />

        <small class="text-red-500 text-xs"
          *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Ingresa un email válido
        </small>
      </div>

      <!-- PASSWORD -->
      <div>
        <input
          type="password"
          formControlName="password"
          placeholder="Contraseña"
          class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          [class.border-red-500]="form.get('password')?.invalid && form.get('password')?.touched"
        />

        <small class="text-red-500 text-xs"
          *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Mínimo 6 caracteres
        </small>
      </div>

      <!-- BOTÓN -->
      <button
        type="submit"
        [disabled]="form.invalid"
        class="w-full bg-blue-600 text-white p-3 rounded-lg disabled:opacity-50"
      >
        Registrarse
      </button>

    </form>

    <!-- LINK LOGIN -->
    <p class="text-center text-sm text-gray-500 mt-4">
      ¿Ya tienes cuenta?
      <a routerLink="/login" class="text-blue-600 hover:underline">
        Inicia sesión
      </a>
    </p>

  </div>
</div>
