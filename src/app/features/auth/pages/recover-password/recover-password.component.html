<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

  <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg p-6">

    <h1 class="text-2xl font-bold text-center mb-6">
      Recuperar contraseña
    </h1>

    <form [formGroup]="form" (ngSubmit)="recover()" class="space-y-4">

      <input
        type="email"
        formControlName="email"
        placeholder="Ingresa tu correo"
        class="w-full p-3 border rounded-lg"
      />

      <button
        type="submit"
        [disabled]="form.invalid"
        class="w-full bg-blue-500 text-white p-3 rounded-lg disabled:opacity-50"
      >
        Enviar enlace
      </button>

    </form>

    <!-- MENSAJE SIMULADO -->
    <p *ngIf="enviado" class="text-green-600 text-sm text-center mt-4">
  Se enviaron instrucciones de recuperación.
</p>

    <p class="text-center text-sm text-gray-500 mt-4">
      <a routerLink="/login" class="text-blue-600 hover:underline">
        Volver al login
      </a>
    </p>

  </div>
</div>
