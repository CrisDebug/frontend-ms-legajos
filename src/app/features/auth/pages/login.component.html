<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

  <div class="w-full max-w-sm bg-white rounded-2xl shadow-lg p-6">

    <h1 class="text-2xl font-bold text-center mb-6">
      Iniciar Sesión
    </h1>

    <form [formGroup]="form" (ngSubmit)="login()" class="space-y-4">

      <!-- EMAIL -->
      <div>
        <input
          type="email"
          formControlName="email"
          placeholder="Correo electrónico"
          class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          [class.border-red-500]="form.get('email')?.invalid && form.get('email')?.touched"
        />

        <small class="text-red-500" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Email inválido
        </small>
      </div>

      <!-- PASSWORD -->
      <div>
        <input
          type="password"
          formControlName="password"
          placeholder="Contraseña"
          class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          [class.border-red-500]="form.get('password')?.invalid && form.get('password')?.touched"
        />

        <small class="text-red-500" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Mínimo 6 caracteres
        </small>
      </div>

      <!-- ERROR BACKEND -->
      <p *ngIf="error" class="text-red-600 text-sm text-center">
        {{ error }}
      </p>

      <!-- BOTÓN -->
      <button
        type="submit"
        [disabled]="form.invalid || loading"
        class="w-full bg-blue-600 text-white p-3 rounded-lg disabled:opacity-50 flex justify-center items-center gap-2"
        >
        <span *ngIf="!loading">Entrar</span>

        <span *ngIf="loading">
            Cargando...
        </span>
        </button>

    </form>

    <!-- RECOVERY SIMULADO -->
    <p class="text-center text-sm text-gray-500 mt-4">
      ¿Olvidaste tu contraseña?
    </p>

  </div>
</div>
