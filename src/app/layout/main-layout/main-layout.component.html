<!-- CONTENEDOR PRINCIPAL: ocupa toda la pantalla -->
<div class="h-screen flex flex-col">

  <!-- TOPBAR: barra superior fija (branding + usuario) -->
  <app-topbar></app-topbar>

  <!-- CUERPO PRINCIPAL: sidebar + contenido -->
  <div class="flex flex-1 overflow-hidden">

    <!-- SIDEBAR: navegación por casilleros (origen del contexto) -->
    <app-sidebar></app-sidebar>

    <!-- ZONA PRINCIPAL -->
    <main class="flex-1 overflow-y-auto p-6">

      <!-- CONTEXTO ACTIVO (solo lectura del estado global) -->
      <div class="mb-4 text-sm text-slate-600">
        Casillero activo:
        <span class="font-semibold text-slate-900">
          {{ (casilleroId$ | async) ? (casilleroId$ | async) : 'Ninguno seleccionado' }}
        </span>
      </div>

      <!-- AQUI SE RENDERIZAN LAS PAGES -->
      <router-outlet></router-outlet>

    </main>

  </div>
</div>
