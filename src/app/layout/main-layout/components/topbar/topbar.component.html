<header class="h-14 bg-white border-b border-slate-200 flex items-center justify-between px-6 bg-linear-to-r from-yellow-100">

  <!-- Branding -->
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-xl bg-slate-900 text-white flex items-center justify-center font-bold">
      M
    </div>

    <span class="font-semibold text-slate-900">
      Microdocs
    </span>

    <span class="text-slate-500 text-sm hidden sm:inline">
      Gestión Documental
    </span>
  </div>

  <!-- USER -->
  <div class="flex items-center gap-4 text-sm text-slate-600 hidden md:flex">

    <span *ngIf="user$ | async as user">
      {{ user.nombreUsuario }} · {{ user.rol }}
    </span>

    <!-- SOLO NAVIGACIÓN (NO TOGGLE) -->
    <button
  *ngIf="(role$ | async) === 'ADMIN'"
  (click)="toggleAdmin.emit()"
  class="text-indigo-600 hover:text-indigo-800 font-medium"
>
  Panel Admin
</button>

    <button (click)="logout()"
      class="text-red-600 hover:text-red-800 font-medium">
      Logout
    </button>

  </div>

</header>
